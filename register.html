<!DOCTYPE html>
<html>
<head>

<title>Register</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
font-family:Segoe UI;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.form-box{
background:white;
padding:40px;
border-radius:12px;
width:350px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#1a5f3f;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.error{
color:red;
display:none;
font-size:14px;
}

.eye{
position:absolute;
right:15px;
margin-top:-35px;
cursor:pointer;
}
.password-box{
position:relative;
}

.eye{
position:absolute;
right:12px;
top:12px;
cursor:pointer;
color:#777;
}

.register-btn{
width:100%;
padding:12px;
background:#1a5f3f;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

.register-btn:hover{
background:#2d8f5f;
}

.login-btn{
display:block;
text-align:center;
margin-top:10px;
padding:10px;
background:#eee;
border-radius:8px;
text-decoration:none;
color:#333;
}

.login-btn:hover{
background:#ddd;
}

</style>

</head>

<body>

<div class="form-box">

<h2>Register</h2>

<div class="error" id="errorMsg">
Please fill all fields
</div>


<form onsubmit="return validateForm()">

<input type="text" id="name" placeholder="Full Name">

<input type="email" id="email" placeholder="Email">

<div class="password-box">
<input type="password" id="password" placeholder="Password">
<i class="fa fa-eye eye" onclick="togglePassword()"></i>
</div>

<button type="submit" class="register-btn">
Create Account
</button>

<a href="login.html" class="login-btn">
Login
</a>

</form>

</div>

<script>

function togglePassword(){

var pass=document.getElementById("password");

if(pass.type==="password"){
pass.type="text";
}else{
pass.type="password";
}

}

function validateForm(){

var name=document.getElementById("name").value;
var email=document.getElementById("email").value;
var pass=document.getElementById("password").value;

if(name==="" || email==="" || pass===""){

document.getElementById("errorMsg").style.display="block";
return false;

}else{

window.location.href="404.html";
return false;

}

}

</script>

</body>
</html>
