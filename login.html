<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Stackly Grocery</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
    --primary:#1a5f3f;
    --primary-light:#2d8f5f;
    --bg:#f5f5f5;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#e8f5e9,#f5f5f5);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.login-card{
    width:100%;
    max-width:450px;
    background:#fff;
    border-radius:20px;
    padding:40px;
    box-shadow:0 15px 40px rgba(0,0,0,.1);
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo img{
    height:60px;
}

h2{
    text-align:center;
    color:var(--primary);
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:30px;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

.input-box{
    position:relative;
}

.input-box i{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    color:#888;
}

.input-box input{
    width:100%;
    padding:14px 15px 14px 45px;
    border:2px solid #ddd;
    border-radius:12px;
    outline:none;
}

.input-box input:focus{
    border-color:var(--primary);
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
    font-size:14px;
}

.options a{
    color:var(--primary);
    text-decoration:none;
}

.login-btn{
    width:100%;
    background:var(--primary);
    color:#fff;
    border:none;
    padding:15px;
    border-radius:12px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
}

.login-btn:hover{
    background:var(--primary-light);
}

.signup{
    text-align:center;
    margin-top:20px;
}

.signup a{
    color:var(--primary);
    text-decoration:none;
    font-weight:600;
}

@media(max-width:480px){
    .login-card{
        padding:25px;
    }
}
.back-btn-container{
    display:flex;
    justify-content:center;
    align

.back-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    text-decoration:none;
    color:#1a5f3f;
    font-weight:600;
    padding:10px 20px;
    border:2px solid #1a5f3f;
    border-radius:10px;
    transition:0.3s;
}

.back-btn:hover{
    background:#1a5f3f;
    color:#fff;
}
</style>
</head>
<body>

<div class="login-card">

    <div class="logo">
        <img src="image/logo.webp" alt="Stackly">
    </div>

    <h2>Welcome Back</h2>
    <p class="subtitle">Login to your Stackly account</p>

    <form action="404.html">

        <div class="form-group">
            <label>Email Address</label>
            <div class="input-box">
                <i class="fas fa-envelope"></i>
                <input type="email" placeholder="Enter your email" required>
            </div>
        </div>

        <div class="form-group">
            <label>Password</label>
            <div class="input-box">
                <i class="fas fa-lock"></i>
                <input type="password" placeholder="Enter password" required>
            </div>
        </div>

        <div class="options">
            <label>
                <input type="checkbox">
                Remember Me
            </label>

            <a href="forgot.html">Forgot Password?</a>
        </div>

        <button type="submit" class="login-btn">
            Login
        </button>

        <div class="signup">
            Don't have an account?
            <a href="register.html">Create Account</a>
        </div>
        <div class="back-btn-container">
    <a href="index.html" class="back-btn">
        <i class="fas fa-arrow-left"></i> Back
    </a>
</div>

    </form>

</div>

</body>
</html>
