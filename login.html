<!DOCTYPE html>
<html>
<head>

<title>Stackly Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
font-family:Segoe UI;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:40px;
border-radius:12px;
width:350px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
text-align:center;
}

.logo{
font-size:28px;
color:#1a5f3f;
font-weight:bold;
margin-bottom:20px;
}

.input-group{
margin-bottom:15px;
position:relative;
}

input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
}

.eye{
position:absolute;
right:10px;
top:12px;
cursor:pointer;
color:#777;
}

button{
width:100%;
padding:12px;
background:#1a5f3f;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#2d8f5f;
}

.error{
color:red;
font-size:14px;
margin-bottom:10px;
display:none;
}
.buttons{
display:flex;
flex-direction:column;
gap:10px;
margin-top:15px;
}

.login-btn{
background:#1a5f3f;
color:white;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
}

.login-btn:hover{
background:#2d8f5f;
}

.forgot-btn,
.register-btn{
text-align:center;
padding:10px;
border-radius:8px;
text-decoration:none;
font-size:14px;
}

.forgot-btn{
background:#eee;
color:#333;
}

.register-btn{
background:#ff6b
}
</style>

</head>

<body>

<div class="login-box">

<div class="logo">Stackly</div>

<div class="error" id="errorMsg">
Please fill all fields
</div>

<form onsubmit="return validateForm()">

<div class="input-group">
<input type="email" id="email" placeholder="Email">
</div>

<div class="input-group">
<input type="password" id="password" placeholder="Password">
<i class="fa fa-eye eye" onclick="togglePassword()"></i>
</div>

<button type="submit">Login</button>

</form>
<div class="buttons">



<a href="forgot.html" class="forgot-btn">
Forgot Password
</a>

<a href="register.html" class="register-btn">
Create Account
</a>

</div>

</div>

<script>

function togglePassword(){

var pass=document.getElementById("password");

if(pass.type==="password"){
pass.type="text";
}else{
pass.type="password";
}

}

function validateForm(){

var email=document.getElementById("email").value;
var pass=document.getElementById("password").value;

if(email==="" || pass===""){

document.getElementById("errorMsg").style.display="block";
return false;

}else{

window.location.href="404.html";
return false;

}

}

</script>

</body>
</html>
