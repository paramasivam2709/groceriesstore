<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password - Stackly Grocery</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
    --primary:#1a5f3f;
    --primary-light:#2d8f5f;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#e8f5e9,#f5f5f5);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.forgot-card{
    width:100%;
    max-width:450px;
    background:#fff;
    padding:40px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.1);
}

.logo{
    text-align:center;
    margin-bottom:20px;
}

.logo img{
    height:60px;
}

.icon-box{
    width:80px;
    height:80px;
    background:#e8f5e9;
    color:#1a5f3f;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:32px;
    margin:0 auto 20px;
}

h2{
    text-align:center;
    color:#1a5f3f;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:25px;
    line-height:1.6;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

.input-box{
    position:relative;
}

.input-box i{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    color:#777;
}

.input-box input{
    width:100%;
    padding:14px 15px 14px 45px;
    border:2px solid #ddd;
    border-radius:12px;
    outline:none;
}

.input-box input:focus{
    border-color:#1a5f3f;
}

.reset-btn{
    width:100%;
    border:none;
    background:#1a5f3f;
    color:white;
    padding:15px;
    border-radius:12px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
}

.reset-btn:hover{
    background:#2d8f5f;
}

.back-login{
    text-align:center;
    margin-top:20px;
}

.back-login a{
    color:#1a5f3f;
    text-decoration:none;
    font-weight:600;
}

.success-msg{
    display:none;
    margin-top:20px;
    background:#e8f5e9;
    color:#1a5f3f;
    padding:12px;
    border-radius:10px;
    text-align:center;
}
</style>
</head>
<body>

<div class="forgot-card">

    <div class="logo">
        <img src="image/logo.webp" alt="Stackly Logo">
    </div>

    <div class="icon-box">
        <i class="fas fa-key"></i>
    </div>

    <h2>Forgot Password?</h2>

    <p class="subtitle">
        Enter your registered email address and we'll send you a password reset link.
    </p>

    <form onsubmit="sendReset(event)">

        <div class="form-group">
            <label>Email Address</label>
            <div class="input-box">
                <i class="fas fa-envelope"></i>
                <input type="email" required placeholder="Enter your email">
            </div>
        </div>

        <button class="reset-btn" type="submit">
            Send Reset Link
        </button>

        <div class="success-msg" id="successMsg">
            Password reset link sent successfully!
        </div>

        <div class="back-login">
            <a href="login.html">
                <i class="fas fa-arrow-left"></i>
                Back to Login
            </a>
        </div>

    </form>

</div>

<script>
function sendReset(e){
    e.preventDefault();
    document.getElementById("successMsg").style.display="block";
}
</script>

</body>
</html>
