<!DOCTYPE html>
<html>
<head>

<title>Forgot Password</title>

<style>

body{
font-family:Segoe UI;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:40px;
border-radius:12px;
width:350px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#1a5f3f;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.error{
color:red;
display:none;
font-size:14px;
}

</style>

</head>

<body>

<div class="box">

<h2>Forgot Password</h2>

<div class="error" id="errorMsg">
Please enter email
</div>

<form onsubmit="return validateForm()">

<input type="email" id="email" placeholder="Email">

<button>Reset Password</button>

</form>

</div>

<script>

function validateForm(){

var email=document.getElementById("email").value;

if(email===""){

document.getElementById("errorMsg").style.display="block";
return false;

}else{

window.location.href="404.html";
return false;

}

}

</script>

</body>
</html>
